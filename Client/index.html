<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Around the world in a click!</title>
  </head>
  <body>
    <h1 id="projectTitle" class="projectTitle">Stamp your digital passport!</h1>
    <form id="guestbookForm" class="guestbookForm">
      <label for="name" id="yourNameHere" class="yourNameHere">Your name here </label>
      <input
        type="text"
        id="nameInput"
        name="name"
        placeholder="Write your name here"
      />
      <label for="date" id="todaysDateHere" class="todaysDateHere">Today's date here </label>
      <input 
        type="date"
        id="dateInput" 
        name="date" 
        required 
        />
      <label for="country" id="countryYouArePostingFromHere" class="countryYouArePostingFromHere">Country you are posting from here </label>
      <input
        type="text"
        id="countryInput"
        name="country"
        placeholder="Write which country you are posting from here"
        required
      />
      <label for="message" id="writeYourMessageHere" class="writeYourMessageHere">Write your message here </label>
      <input
        type="text"
        id="messageInput"
        name="message"
        placeholder="Write your message here"
        required
      />
      <label for="image" id="uploadAPhotoHere" class="uploadAPhotoHere">Upload a photo here </label>
      <input 
        type="file"
        id="imageInput"
        name="image"
        accept="image/jpeg, image/jpg" 
        />
      <button type="submit" id="submitYourGuestbookEntry" class="submitYourGuestbookEntry">Submit your guestbook entry</button>
    </form>
    <div id="allGuestbookEntriesContainer" class="allGuestbookEntriesContainer">
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
